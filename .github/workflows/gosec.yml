name: Run Gosec
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      # Run the gosec version pinned in tools/go.mod (same as run-gosec.sh),
      # not the floating securego/gosec@master action, for reproducible scans.
      - name: Run Gosec
        run: go tool -modfile=tools/go.mod gosec ./...
